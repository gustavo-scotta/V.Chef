<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V.Chef — Preferências</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="preferencias.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">
        <img src="VchefLogo.png" alt="Logo V.chef">
</div>
      VChef
    </div>
    <button class="avatar-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="18" height="18">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </button>
  </header>

  <!-- NAV TABS -->
  <nav class="tab-nav">
    <button class="tab" data-tab="despensa">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16"><path d="M3 3h18v4H3zM5 7v14h14V7"/><line x1="9" y1="12" x2="15" y2="12"/></svg>
      Despensa
    </button>
    <button class="tab" data-tab="cozinha">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16"><path d="M12 2a7 7 0 0 1 7 7c0 4-3 6-3 9H8c0-3-3-5-3-9a7 7 0 0 1 7-7z"/><line x1="8" y1="22" x2="16" y2="22"/><line x1="9" y1="18" x2="15" y2="18"/></svg>
      Cozinha
    </button>
    <button class="tab active" data-tab="preferencias">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="16" height="16"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Preferências
    </button>
  </nav>

  <!-- MAIN CONTENT -->
  <main>

    <section class="section">
      <h2 class="section-title">Alimentos que não gosto</h2>
      <div class="tags-container" id="tags-container">
      </div>
      <div class="add-row">
        <input type="text" id="foodInput" class="food-input" placeholder="Adicionar alimento" onkeydown="if(event.key==='Enter') addTag()"/>
        <button class="add-btn" onclick="addTag()">
          <span>+</span> Adicionar
        </button>
      </div>
    </section>

    <!-- Alergias -->
    <section class="section">
      <h2 class="section-title">Alergias</h2>
      <div class="toggle-grid" id="allergy-grid">
        <div class="toggle-card">
          <span class="toggle-label">Lactose</span>
          <label class="toggle-switch">
            <input type="checkbox">
            <span class="slider"></span>
          </label>
        </div>
        <div class="toggle-card">
          <span class="toggle-label">Glúten</span>
          <label class="toggle-switch">
            <input type="checkbox">
            <span class="slider"></span>
          </label>
        </div>
        <div class="toggle-card">
          <span class="toggle-label">Amendoim</span>
          <label class="toggle-switch">
            <input type="checkbox">
            <span class="slider"></span>
          </label>
        </div>
        <div class="toggle-card">
          <span class="toggle-label">Frutos do mar</span>
          <label class="toggle-switch">
            <input type="checkbox">
            <span class="slider"></span>
          </label>
        </div>
      </div>
      <div class="add-row" style="margin-top:14px;">
        <input type="text" id="allergyInput" class="food-input" placeholder="Adicionar alergia" onkeydown="if(event.key==='Enter') addAllergy()"/>
        <button class="add-btn" onclick="addAllergy()">
          <span>+</span> Adicionar
        </button>
      </div>
    </section>

    <!-- Dietas -->
    <section class="section">
      <h2 class="section-title">Dietas</h2>
      <div class="toggle-grid" id="diet-grid">
        <div class="toggle-card">
          <span class="toggle-label">Vegetariano</span>
          <label class="toggle-switch">
            <input type="checkbox">
            <span class="slider"></span>
          </label>
        </div>
        <div class="toggle-card">
          <span class="toggle-label">Vegano</span>
          <label class="toggle-switch">
            <input type="checkbox">
            <span class="slider"></span>
          </label>
        </div>
        <div class="toggle-card">
          <span class="toggle-label">Low carb</span>
          <label class="toggle-switch">
            <input type="checkbox">
            <span class="slider"></span>
          </label>
        </div>
        <div class="toggle-card">
          <span class="toggle-label">Sem açúcar</span>
          <label class="toggle-switch">
            <input type="checkbox">
            <span class="slider"></span>
          </label>
        </div>
      </div>
      <div class="add-row" style="margin-top:14px;">
        <input type="text" id="dietInput" class="food-input" placeholder="Adicionar dieta" onkeydown="if(event.key==='Enter') addDiet()"/>
        <button class="add-btn" onclick="addDiet()">
          <span>+</span> Adicionar
        </button>
      </div>
    </section>
 
  </main>

  </main>

  <!-- SAVE BUTTON -->
  <div class="save-bar">
    <button class="save-btn" onclick="savePrefs()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <polyline points="17 21 17 13 7 13 7 21"/>
        <polyline points="7 3 7 8 15 8"/>
      </svg>
      Salvar Preferências
    </button>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast">✓ Preferências salvas!</div>

  <script src="preferencias.js"></script>
</body>
</html>
