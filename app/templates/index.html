<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>V.Chef</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

  <!-- HEADER -->
  <header>

    <div class="logo">

      <div class="logo-icon">
        <img src="{{ url_for('static', filename='img/VchefLogo.png') }}" alt="Logo V.Chef">
      </div>

      V.Chef

    </div>

    <nav>
      <button>Dispensa</button>
      <button>Cozinha</button>
      <button>Preferência</button>
    </nav>

    <button class="avatar-btn">

      <svg viewBox="0 0 24 24"
           fill="none"
           stroke="currentColor"
           stroke-width="1.8"
           width="18"
           height="18">

        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>

      </svg>

    </button>

  </header>

  <!-- CHAT -->
  <div class="chat-wrapper" id="chat">

    <!-- Mensagem inicial -->

    <div class="msg-row bot">

      <div class="bubble bot">

        👨‍🍳 Bem-vindo ao V.Chef!<br><br>

        Posso ajudar com:
        <br><br>

        • Receitas<br>
        • Jantares românticos<br>
        • Massas<br>
        • Sobremesas<br>
        • Receitas rápidas<br>
        • Comida fitness<br>
        • Harmonizações<br>
        • Técnicas culinárias

      </div>

    </div>

  </div>

  <!-- INPUT -->
  <div class="input-area">

    <div class="chips" id="chips">

      <button class="chip" onclick="sendChip(this)">
        🌿 Vegetariano
      </button>

      <button class="chip" onclick="sendChip(this)">
        🍝 Massas
      </button>

      <button class="chip" onclick="sendChip(this)">
        ⚡ Rápido (&lt; 20 min)
      </button>

      <button class="chip" onclick="sendChip(this)">
        🥗 Light
      </button>

    </div>

    <div class="input-bar">

      <input
        type="text"
        id="msgInput"
        placeholder="Qual é a sua dúvida na cozinha hoje?"
      />

      <button
        class="send-btn"
        id="sendBtn"
      >

        <svg viewBox="0 0 24 24"
             fill="none"
             stroke="currentColor"
             stroke-width="2"
             stroke-linecap="round"
             stroke-linejoin="round">

          <line x1="22" y1="2" x2="11" y2="13"/>

          <polygon points="22 2 15 22 11 13 2 9 22 2"/>

        </svg>

      </button>

    </div>

  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>

</html>
