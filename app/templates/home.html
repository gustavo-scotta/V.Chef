{% extends 'base.html' %}

{% block title %}Home - V.Chef{% endblock %}

{% block page_css %}
<!-- CSS exclusivo da Home: contem o chat e os cards de receita. -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
{% endblock %}

{% block content %}

<div class="container-home" >
    <div class="card-opcoes">
        <h2 class="titulo">
            Bem vindo {{usuario}}
        </h2>

        <ul>
            <li>Culinaria Francesa</li>
            <li>Sobremesas</li>
            <li>Sucos</li>
            <li>Comida Fit</li>
        </ul>
    </div>
</div>

<div>
    <div>
        <input id="mensagem" type="text" placeholder="Qual receita deseja aprender hoje">
        <button id="botao-enviar">Enviar</button>
    </div>
</div>
<div id="resposta_ia"></div>

{% endblock %}

{% block page_js %}
<!-- JS exclusivo da Home: controla envio de mensagens e renderizacao das respostas. -->
<script src="{{ url_for('static', filename='js/home.js') }}"></script>
{% endblock %}
